experience:
  title: 实习经历
  items:
    - date: "2025.08 - 至今 · 上海"
      title: "<strong>vivo</strong> 影像算法研究部 BlueImage Lab"
      subtitle: 研究实习生
      description: >
        <ul>
          <li>探索面向相册场景的 RAG 问答与图像描述生成任务，设计了系统化的图像文本化算法，构建文本化记忆库以提升处理效率并全面覆盖视觉信息</li>
          <li>探索图像质量评估方法与对比方案的设计</li>
        </ul>
    - date: "2023.09 - 2024.09 · 广东 深圳"
      title: "<strong>华为</strong> 2012 实验室 中央研究院 规划部"
      subtitle: 研究实习生
      description: >
        <ul>
          <li>参与"个人数据底座"构建，探索将终端设备中的多源异构用户数据转化为可用的个人知识库；发掘从用户被动写入到设备主动触发、从应用被动发起到环境主动触发的全流程可用业务场景</li>
          <li>针对短信、邮箱、备忘录等文本数据，设计个人 Schema 与知识抽取算法，并构建自动化数据构造流程；针对相册等图像数据，设计人物亲密度挖掘与事件挖掘算法</li>
          <li>针对海量输入与交互数据，探索记忆的写入、存储与检索机制，在降低噪声、避免冗余计算、提升存储效率与检索准确性的同时，支持多类型查询与多场景需求变化</li>
          <li>与小艺、理论部、先进计算与存储实验室、终端 BG 预研部等部门紧密合作推动技术落地，相关算法最终成为技术秘密，并进入 Harmony 5.0 概念项目与 Harmony 5.1 技术管道</li>
        </ul>
    - date: "2018.06 - 2018.09 · 江苏 南京"
      title: "<strong>华为</strong> 南京研究所 软件产品线"
      subtitle: 实习生
      description: >
        <ul>
          <li>梳理并贯通通信产品渠道销售平台的前中后台业务逻辑与数据流转</li>
          <li>针对新业务需求，独立设计并开发全新前端组件</li>
        </ul>

