profile:
  name: 仲奕杰
  subtitle: 同济大学 博士研究生
  bio: >
    我是同济大学 <a href="https://tongji-kgllm.github.io/" target="_blank">Knowledge Computing Lab</a> 的博士研究生，师从王昊奋教授，于 2022 年在南京大学获得硕士学位，师从孙正兴教授。目前我的研究兴趣涵盖检索增强生成（RAG）与智能体（Agent）研究中的信息抽取、记忆与检索机制，尤其关注智能终端上的个人知识图谱构建、个人信息管理与个性化应用。截至目前，我已在顶级会议与期刊发表学术论文 16 篇，其中以第一作者身份发表 10 篇。另有 5 篇正在审稿中。

