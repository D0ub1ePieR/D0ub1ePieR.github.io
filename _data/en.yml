experience:
  title: Experience
  items:
    - date: "2025.08 - Present · Shanghai"
      title: "<strong>vivo</strong> Imaging Algorithm Research Lab, BlueImage Lab"
      subtitle: Research Intern
      description: >
        <ul>
          <li>Explored RAG-based question answering and image captioning for photo album scenarios; designed a systematic image-to-text algorithm and built a textual memory bank to improve efficiency while comprehensively covering visual information</li>
          <li>Investigated image quality assessment methods and comparison scheme design</li>
        </ul>
    - date: "2023.09 - 2024.09 · Shenzhen, Guangdong"
      title: "<strong>Huawei</strong> 2012 Laboratories, Central Research Institute, Planning Department"
      subtitle: Research Intern
      description: >
        <ul>
          <li>Participated in the construction of the "Personal Data Foundation", exploring the transformation of multi-source heterogeneous user data from terminal devices into usable personal knowledge bases; identified end-to-end use cases transitioning from passive user input to proactive device triggering, and from passive application initiation to context-aware activation</li>
          <li>Designed personal schema and knowledge extraction algorithms for text data (SMS, email, memos, etc.) and built automated data construction pipelines; developed person intimacy mining and event detection algorithms for photo album images</li>
          <li>Explored memory write, storage, and retrieval mechanisms for massive input and interaction data, reducing noise, avoiding redundant computation, improving storage efficiency and retrieval accuracy, while supporting multi-type queries and diverse scenario requirements</li>
          <li>Collaborated closely with Celia, Theoretical Department, Advanced Computing and Storage Laboratory, and Terminal BG Pre-research Department to drive technology deployment; algorithms ultimately became trade secrets and entered Harmony 5.0 concept project and Harmony 5.1 technology pipeline</li>
        </ul>
    - date: "2018.06 - 2018.09 · Nanjing, Jiangsu"
      title: "<strong>Huawei</strong> Nanjing Research Institute, Software Product Line"
      subtitle: Intern
      description: >
        <ul>
          <li>Streamlined end-to-end business logic and data flow for the communications product channel sales platform across front, middle, and back offices</li>
          <li>Independently designed and developed new front-end components for emerging business requirements</li>
        </ul>

