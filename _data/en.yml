profile:
  name: Yijie Zhong
  subtitle: Ph.D. Student at Tongji University
  bio: >
    I am a Ph.D. student at the <a href="https://tongji-kgllm.github.io/" target="_blank">Knowledge Computing Lab</a>, Tongji University, supervised by Prof. Haofen Wang. I received my M.S. degree from Nanjing University in 2022, under the supervision of Prof. Zhengxing Sun. My research interests encompass information extraction, memory and retrieval mechanisms in Retrieval-Augmented Generation (RAG) and LLM Agents, with a particular focus on personal knowledge graph construction, personal information management, and personalized applications on intelligent devices. To date, I have published 16 papers in top-tier conferences and journals, 10 of which are first-authored. An additional 5 papers are currently under review.

